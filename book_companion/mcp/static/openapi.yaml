openapi: 3.1.0
info:
  title: Book Companion MCP API
  version: 0.1.0
  description: |
    MCP (Model Context Protocol) server for chatting with books using RAG and LLMs.

    This API provides tools for searching books, accessing summaries, and RAG-powered chat.
    It also supports Google Drive integration for finding and ingesting books.

    ## Authentication

    When OAuth is enabled (`MCP_OAUTH_ENABLED=true`), all tool endpoints require authentication:
    - Use the `/register` endpoint for dynamic client registration
    - Complete the OAuth flow via `/authorize` and `/token`
    - Include `Authorization: Bearer <token>` header on requests

    ## MCP Protocol

    This server implements the Model Context Protocol for tool use:
    - SSE transport: Connect to `/sse` for Server-Sent Events
    - HTTP transport: POST to `/mcp` for Streamable HTTP

  contact:
    name: Book Companion
  license:
    name: MIT

servers:
  # Replace with your actual Cloud Run service URL
  - url: https://your-cloud-run-url.run.app
    description: Cloud Run deployment (replace with your service URL)
  - url: http://localhost:8765
    description: Local development

security:
  - oauth2: [mcp]

tags:
  - name: Books
    description: Book listing and information
  - name: Search
    description: Semantic search across books
  - name: Chat
    description: RAG-powered chat with books
  - name: Google Drive
    description: Google Drive integration
  - name: Stats
    description: Usage statistics
  - name: OAuth
    description: OAuth 2.1 authentication endpoints

paths:
  /.well-known/oauth-authorization-server:
    get:
      tags: [OAuth]
      summary: OAuth Server Metadata
      description: Returns OAuth 2.0 Authorization Server Metadata (RFC 8414)
      security: []
      responses:
        '200':
          description: Server metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthMetadata'

  /register:
    post:
      tags: [OAuth]
      summary: Dynamic Client Registration
      description: Register a new OAuth client (RFC 7591)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientRegistrationRequest'
      responses:
        '201':
          description: Client registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientRegistrationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /authorize:
    get:
      tags: [OAuth]
      summary: Authorization Endpoint
      description: |
        OAuth authorization endpoint. Validates parameters and issues authorization code
        if Google Drive credentials are available.
      security: []
      parameters:
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code]
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
            format: uri
        - name: scope
          in: query
          schema:
            type: string
            default: mcp
        - name: state
          in: query
          schema:
            type: string
        - name: code_challenge
          in: query
          schema:
            type: string
        - name: code_challenge_method
          in: query
          schema:
            type: string
            enum: [S256]
      responses:
        '302':
          description: Redirect to client with authorization code or error

  /token:
    post:
      tags: [OAuth]
      summary: Token Endpoint
      description: Exchange authorization code for access token, or refresh an existing token
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /health:
    get:
      tags: [Stats]
      summary: Health Check
      description: Returns server health status
      security: []
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy

  /openapi.json:
    get:
      tags: [Stats]
      summary: OpenAPI Specification
      description: Returns this OpenAPI specification in JSON format
      security: []
      responses:
        '200':
          description: OpenAPI specification
          content:
            application/json:
              schema:
                type: object

components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.1 authorization code flow
      flows:
        authorizationCode:
          authorizationUrl: /authorize
          tokenUrl: /token
          scopes:
            mcp: Access to all MCP tools

  schemas:
    # OAuth Schemas
    OAuthMetadata:
      type: object
      properties:
        issuer:
          type: string
          format: uri
        authorization_endpoint:
          type: string
          format: uri
        token_endpoint:
          type: string
          format: uri
        registration_endpoint:
          type: string
          format: uri
        response_types_supported:
          type: array
          items:
            type: string
        grant_types_supported:
          type: array
          items:
            type: string
        code_challenge_methods_supported:
          type: array
          items:
            type: string
        scopes_supported:
          type: array
          items:
            type: string

    ClientRegistrationRequest:
      type: object
      required:
        - client_name
        - redirect_uris
      properties:
        client_name:
          type: string
          description: Human-readable client name
        redirect_uris:
          type: array
          items:
            type: string
            format: uri
          description: List of allowed redirect URIs
        grant_types:
          type: array
          items:
            type: string
          default: [authorization_code, refresh_token]
        response_types:
          type: array
          items:
            type: string
          default: [code]
        scope:
          type: string
          default: mcp

    ClientRegistrationResponse:
      type: object
      properties:
        client_id:
          type: string
        client_secret:
          type: string
        client_name:
          type: string
        redirect_uris:
          type: array
          items:
            type: string
        grant_types:
          type: array
          items:
            type: string
        response_types:
          type: array
          items:
            type: string
        scope:
          type: string
        client_id_issued_at:
          type: integer

    TokenRequest:
      type: object
      required:
        - grant_type
        - client_id
        - client_secret
      properties:
        grant_type:
          type: string
          enum: [authorization_code, refresh_token]
        client_id:
          type: string
        client_secret:
          type: string
        code:
          type: string
          description: Required for authorization_code grant
        redirect_uri:
          type: string
          description: Required for authorization_code grant
        code_verifier:
          type: string
          description: Required if code_challenge was used
        refresh_token:
          type: string
          description: Required for refresh_token grant

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Token lifetime in seconds
        refresh_token:
          type: string
        scope:
          type: string

    # MCP Tool Schemas
    Book:
      type: object
      properties:
        id:
          type: string
          description: Unique book identifier
        title:
          type: string
        author:
          type: string
          nullable: true
        format:
          type: string
          enum: [pdf, epub, markdown]
        total_chunks:
          type: integer
        total_pages:
          type: integer
          nullable: true
        has_index:
          type: boolean
          description: Whether summarization has been completed
        ingested_at:
          type: string
          format: date-time

    SearchResult:
      type: object
      properties:
        book_id:
          type: string
        book_title:
          type: string
        text:
          type: string
          description: Matching text content
        chapter_title:
          type: string
          nullable: true
        chapter_number:
          type: integer
          nullable: true
        page_number:
          type: integer
          nullable: true
        chunk_id:
          type: string

    ChatResponse:
      type: object
      properties:
        response:
          type: string
          description: LLM response text
        session_id:
          type: string
          description: Session ID for continuation
        book_id:
          type: string
        book_title:
          type: string
        provider:
          type: string
          enum: [gemini, claude]
        context_chunks:
          type: integer
          description: Number of context chunks used
        citations:
          type: array
          items:
            $ref: '#/components/schemas/Citation'
        usage:
          $ref: '#/components/schemas/TokenUsage'

    Citation:
      type: object
      properties:
        chunk_id:
          type: string
        chapter_title:
          type: string
          nullable: true
        chapter_number:
          type: integer
          nullable: true
        page_number:
          type: integer
          nullable: true

    TokenUsage:
      type: object
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cost_usd:
          type: number
        cost_formatted:
          type: string

    DriveFile:
      type: object
      properties:
        id:
          type: string
          description: Google Drive file ID
        name:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer
          nullable: true
        is_ingested:
          type: boolean
          description: Whether the book is already ingested
        ingested_book_id:
          type: string
          nullable: true
          description: Book ID if already ingested
        score:
          type: integer
          description: Match score (0-100), only present for search results

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error code
        error_description:
          type: string
          description: Human-readable error description

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Unauthorized - missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      headers:
        WWW-Authenticate:
          schema:
            type: string
            example: 'Bearer realm="mcp"'
