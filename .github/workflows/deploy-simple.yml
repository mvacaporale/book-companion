# Deploy to Cloud Run on push to main (Simple version with service account key)
name: Deploy to Cloud Run (Simple)

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

env:
  PROJECT_ID: general-477905
  REGION: us-central1
  SERVICE_NAME: book-companion-mcp
  BUCKET_NAME: general-477905-bookrc-data

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run tests
        run: uv run pytest

  deploy:
    needs: test  # Block deploy until tests pass
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          # Base64 encode the Google Drive token to avoid shell escaping issues
          DRIVE_TOKEN_B64=$(echo '${{ secrets.GOOGLE_DRIVE_TOKEN }}' | base64 -w 0)

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --source . \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2 \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --set-env-vars "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
            --set-env-vars "GOOGLE_DRIVE_TOKEN_B64=${DRIVE_TOKEN_B64}" \
            --set-env-vars "GOOGLE_DRIVE_FOLDER_ID=${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}" \
            --set-env-vars "BOOKRC_DB_PATH=/data/bookrc" \
            --set-env-vars "MCP_OAUTH_ENABLED=true" \
            --execution-environment gen2 \
            --add-volume "name=bookrc-data,type=cloud-storage,bucket=${{ env.BUCKET_NAME }}" \
            --add-volume-mount "volume=bookrc-data,mount-path=/data/bookrc"

      - name: Show deployment URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "## Deployment Complete! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**MCP Server URL:** ${URL}/sse" >> $GITHUB_STEP_SUMMARY
